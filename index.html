            const handleSelectAll = () => setSelectedIds(allSentences.map(s => s.id));
            const handleClearAll = () => setSelectedIds([]);
            
            const handleToggleSelect = (id, event) => {
                if(event.target.tagName !== 'INPUT') return; 
                
                if (selectedIds.includes(id)) {
                    setSelectedIds(selectedIds.filter(i => i !== id));
                } else {
                    setSelectedIds([...selectedIds, id]);

            const startPractice = () => {
                if (selectedIds.length === 0) return;
                setCurrentIndex(0);
                setDisplayMode('blank');
                setCurrentView('practice');
                resetPracticeStates();

            // --- 学習画面の処理 ---
            const activeSentences = allSentences.filter(s => selectedIds.includes(s.id));
            const currentSentence = activeSentences[currentIndex];

            const goBackToList = () => {
                setCurrentView('list');
                resetPracticeStates();
            };

            const resetPracticeStates = () => {
                setAudioUrl(null);
                setRecognitionText("");
                setSimilarityScore(null);
                setIsProcessing(false);
                if (isActive) stopBoth();
            };

            const nextSentence = () => {
                if (currentIndex < activeSentences.length - 1) {
                    setCurrentIndex(currentIndex + 1);
                    resetPracticeStates();
                }
            };

            const prevSentence = () => {
                if (currentIndex > 0) {
                    setCurrentIndex(currentIndex - 1);
                    resetPracticeStates();
                }
            };

            const speakEnglish = () => {
                if ('speechSynthesis' in window && currentSentence) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(currentSentence.en);
                    utterance.lang = 'en-US';
                    utterance.rate = 0.85; 
                    window.speechSynthesis.speak(utterance);
                } else {
                    alert("Your browser does not support text-to-speech.");
                }
            };

            // --- 録音とAI音声認識の統合処理 ---
            const startBoth = async () => {
                setAudioUrl(null);
                setRecognitionText("");
                setSimilarityScore(null);
                setIsProcessing(false);

                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    
                    const mediaRecorder = new MediaRecorder(stream);
                    mediaRecorderRef.current = mediaRecorder;
                    audioChunksRef.current = [];

                    mediaRecorder.ondataavailable = (event) => {
                        if (event.data.size > 0) audioChunksRef.current.push(event.data);
                    };

                    mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(audioChunksRef.current, { type: 'audio/webm' });
                        const url = URL.createObjectURL(audioBlob);
                        setAudioUrl(url);
                        stream.getTracks().forEach(track => track.stop());
                        calculateSimilarityAndRender(); 
                    };

                    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                    if (SpeechRecognition) {
                        const recognition = new SpeechRecognition();
                        recognitionRef.current = recognition;
                        recognition.lang = 'en-US';
                        recognition.interimResults = false; 
                        recognition.maxAlternatives = 1;

                        recognition.onstart = () => {
                            setIsActive(true);
                        };

                        recognition.onresult = (event) => {
                            const transcript = Array.from(event.results).map(result => result[0].transcript).join('');
                            setRecognitionText(transcript);
                        };

                        recognition.onspeechend = () => {
                            recognition.stop();
                        };

                        recognition.onend = () => {
                            setIsActive(false);
                            setIsProcessing(true);
                            if (mediaRecorderRef.current && mediaRecorderRef.current.state !== 'inactive') {
                                mediaRecorderRef.current.stop();
                            } else {
                               calculateSimilarityAndRender(); 
                            }
                        };

                        recognition.start();
                    } else {
                        alert("Your browser does not support AI speech recognition. Recording only.");
                        setIsActive(true);
                        mediaRecorder.start();
                    }

                    if(SpeechRecognition) {
                       mediaRecorder.start();
                    }

                } catch (error) {
                    console.error("Microphone access error:", error);
                    alert("Microphone access denied. Please check your browser settings.");
                }
            };

            const stopBoth = () => {
                if (recognitionRef.current && isActive) {
                    recognitionRef.current.stop(); 
                } else {
                    if (mediaRecorderRef.current && mediaRecorderRef.current.state !== 'inactive') {
                        mediaRecorderRef.current.stop();
                    }
                    setIsActive(false);
                }
            };

            const toggleRecording = () => {
                if (isActive) {
                    stopBoth();
                } else {
                    startBoth();
                }
            };

            // 厳しめの類似度スコア計算
            const calculateSimilarityAndRender = () => {
                if (recognitionText && currentSentence) {
                    const cleanString = (str) => str.toLowerCase().replace(/[.,?!'"\-]/g, '').trim();
                    const targetClean = cleanString(currentSentence.en);
                    const inputClean = cleanString(recognitionText);
                    
                    if (!inputClean) {
                        setSimilarityScore(0);
                        setIsProcessing(false);
                        return;
                    }
                    
                    if (targetClean === inputClean) {
                        setSimilarityScore(100);
                        setIsProcessing(false);
                        return;
                    }

                    const targetWords = targetClean.split(/\s+/).filter(w => w.length > 0);
                    const inputWords = inputClean.split(/\s+/).filter(w => w.length > 0);
                    
                    const levenshtein = (a, b) => {
                        const matrix = [];
                        for (let i = 0; i <= b.length; i++) matrix[i] = [i];
                        for (let j = 0; j <= a.length; j++) matrix[0][j] = j;
                        for (let i = 1; i <= b.length; i++) {
                            for (let j = 1; j <= a.length; j++) {
                                if (b.charAt(i - 1) === a.charAt(j - 1)) {
                                    matrix[i][j] = matrix[i - 1][j - 1];
                                } else {
                                    matrix[i][j] = Math.min(
                                        matrix[i - 1][j - 1] + 1,
                                        matrix[i][j - 1] + 1,
                                        matrix[i - 1][j] + 1
                                    );
                                }
                            }
                        }
                        return matrix[b.length][a.length];
                    };

                    let matchCount = 0;
                    let remainingTarget = [...targetWords];

                    inputWords.forEach(word => {
                        const exactIndex = remainingTarget.findIndex(t => t === word);
                        if (exactIndex !== -1) {
                            matchCount += 1;
                            remainingTarget.splice(exactIndex, 1);
                        } else {
                            let bestMatchIndex = -1;
                            let minDistance = 2; 
                            
                            remainingTarget.forEach((tWord, i) => {
                                if (Math.abs(word.length - tWord.length) >= 2) return;
                                const dist = levenshtein(word, tWord);
                                if (dist < minDistance) {
                                    minDistance = dist;
                                    bestMatchIndex = i;
                                }
                            });

                            if (bestMatchIndex !== -1) {
                                matchCount += 0.5;
                                remainingTarget.splice(bestMatchIndex, 1);
                            }
                        }
                    });
                    
                    const maxLength = Math.max(targetWords.length, inputWords.length);
                    const rawScore = (matchCount / maxLength) * 100;
                    
                    let finalScore = 10 + (rawScore * 0.9);
                    if (finalScore >= 100) {
                        finalScore = 98;
                    }
                    
                    setSimilarityScore(Math.round(finalScore));
                    setIsProcessing(false);
                }
            };

            // カッコが改行されないようにするフォーマット関数
            const formatBlankText = (text) => {
                // ( ) にマッチさせて分割
                const parts = text.split(/(\(\s*\))/g);
                return parts.map((part, index) => {
                    if (part.match(/^\(\s*\)$/)) {
                        // カッコの部分を span.whitespace-nowrap で囲み、中身に十分な空白(&nbsp;)を挿入する
                        return (
                            <span key={index} className="whitespace-nowrap text-blue-500 font-bold mx-1">
                                (&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;)
                            </span>
                        );
                    }
                    return <span key={index}>{part}</span>;
                });
            };

            // 完全に中央揃えにするタイトルコンポーネント
            const AppTitle = () => (
                <div className="w-full flex flex-col items-center justify-center py-6 md:py-8 bg-white border-b-4 border-blue-600 shadow-sm text-center">
                    <div className="bg-blue-600 p-2 md:p-3 rounded-xl text-white shadow-md inline-flex items-center justify-center mb-3">
                        <IconBookOpen className="w-8 h-8 md:w-10 md:h-10" />
                    </div>
                    <h1 className="text-3xl md:text-5xl italic font-bold font-times text-blue-800 drop-shadow-sm mb-1 text-center w-full">
                        Vision Quest
                    </h1>
                    <h2 className="text-lg md:text-2xl text-gray-800 tracking-wider font-mincho font-bold text-center px-4 w-full">
                        必勝！春の英作文 Target Sentence 60
                    </h2>
                </div>
            );

            // ==========================================
            // Render: List View
            // ==========================================
            if (currentView === 'list') {
                return (
                    <div className="min-h-screen bg-gray-50 pb-28 text-gray-800">
                        <AppTitle />
                        
                        <div className="max-w-5xl mx-auto px-4 py-6 flex flex-col sm:flex-row justify-between items-center gap-4">
                            <p className="text-gray-600 font-bold text-lg font-sans bg-white px-4 py-2 rounded-lg shadow-sm">
                                Selected: <span className="text-blue-600 text-xl mx-1">{selectedIds.length}</span> / {allSentences.length}
                            </p>
                            <div className="flex gap-2 text-sm font-medium font-sans">
                                <button onClick={handleSelectAll} className="px-5 py-2.5 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition-colors shadow-sm font-bold">
                                    Select All
                                </button>
                                <button onClick={handleClearAll} className="px-5 py-2.5 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition-colors shadow-sm font-bold">
                                    Clear All
                                </button>
                            </div>
                        </div>

                        <main className="max-w-5xl mx-auto px-4 pb-8">
                            <div className="grid gap-4">
                                {allSentences.map(sentence => {
                                    const isSelected = selectedIds.includes(sentence.id);
                                    return (
                                        <label 
                                            key={sentence.id} 
                                            className={`flex items-start p-6 rounded-2xl border-2 cursor-pointer transition-all ${
                                                isSelected ? 'border-blue-500 bg-blue-50 shadow-md transform scale-[1.01]' : 'border-gray-200 bg-white hover:border-blue-300 shadow-sm'
                                            }`}
                                            onClick={(e) => handleToggleSelect(sentence.id, e)}
                                        >
                                            <div className="flex-shrink-0 mt-2 mr-6">
                                                <input 
                                                    type="checkbox" 
                                                    className="w-6 h-6 text-blue-600 rounded border-gray-300 focus:ring-blue-500 cursor-pointer"
                                                    checked={isSelected}
                                                    readOnly
                                                />
                                            </div>
                                            <div className="flex-1 w-full">
                                                <div className="flex flex-col sm:flex-row sm:items-center gap-3 mb-3">
                                                    <span className="text-sm font-bold text-white bg-blue-600 px-3 py-1 rounded-full font-sans shadow-sm w-max">
                                                        No.{sentence.id}
                                                    </span>
                                                    <span className="text-sm font-bold text-teal-700 bg-teal-100 px-3 py-1 rounded-full font-mincho shadow-sm w-max">
                                                        {sentence.category}
                                                    </span>
                                                </div>
                                                <p className="font-bold text-gray-900 leading-relaxed font-mincho text-xl md:text-2xl mt-2">
                                                    {sentence.jp}
                                                </p>
                                                <p className={`font-times text-xl md:text-2xl mt-3 tracking-wide prevent-orphan ${isSelected ? 'text-blue-800 font-bold' : 'text-gray-500'}`}>
                                                    {formatBlankText(sentence.enBlank)}
                                                </p>
                                            </div>
                                        </label>
                                    );
                                })}
                            </div>
                        </main>

                        <div className="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 p-4 md:p-6 shadow-[0_-10px_20px_-5px_rgba(0,0,0,0.1)] z-20">
                            <div className="max-w-5xl mx-auto flex justify-center">
                                <button 
                                    onClick={startPractice} 
                                    disabled={selectedIds.length === 0}
                                    className="w-full sm:w-auto px-12 py-4 bg-blue-600 text-white rounded-full font-bold text-xl md:text-2xl shadow-xl hover:bg-blue-700 hover:scale-[1.03] transition-all disabled:opacity-50 disabled:hover:scale-100 disabled:cursor-not-allowed flex justify-center items-center gap-3 font-sans"
                                >
                                    Start Practice ({selectedIds.length})
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // ==========================================
            // Render: Practice View
            // ==========================================
            if (!currentSentence) return null;

            return (
                <div className="min-h-screen bg-gray-50 flex flex-col items-center pb-20 font-sans text-gray-800">
                    
                    {/* 練習画面ではヘッダーをシンプルにし、戻るボタンを上部に配置 */}
                    <div className="w-full bg-white shadow-sm border-b border-gray-200 py-4 px-4 flex justify-between items-center">
                        <button 
                            onClick={goBackToList}
                            className="flex items-center gap-2 px-4 py-2 text-gray-700 hover:text-gray-900 bg-gray-100 border border-gray-300 hover:bg-gray-200 shadow-sm rounded-lg transition-colors font-bold text-sm md:text-base"
                        >
                            <IconArrowLeft className="w-5 h-5" />
                            <span>Back to List</span>
                        </button>
                        <div className="font-bold text-blue-800 font-times text-xl italic hidden sm:block">
                            Vision Quest
                        </div>
                        <div className="w-[120px]"></div> {/* スペース調整用 */}
                    </div>

                    {/* Main Practice Card */}
                    <main className="w-full max-w-4xl mt-8 bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100 mx-4">
                        
                        {/* Header / Nav */}
                        <div className="bg-gray-100 px-6 md:px-10 py-5 flex justify-between items-center border-b border-gray-200">
                            <div className="flex flex-col gap-2">
                               <div className="flex items-center gap-3">
                                 <span className="text-sm font-bold text-white bg-blue-600 px-3 py-1 rounded-full shadow-sm">
                                    No.{currentSentence.id}
                                  </span>
                                 <span className="font-bold text-gray-600 text-lg md:text-xl font-times tracking-wide bg-white px-4 py-1 rounded-lg border border-gray-300 shadow-sm">
                                    Q. {currentIndex + 1} / {activeSentences.length}
                                 </span>
                               </div>
                               <span className="text-sm font-bold text-teal-700 bg-teal-100 px-3 py-1 rounded-full font-mincho shadow-sm self-start">
                                 {currentSentence.category}
                               </span>
                            </div>
                            <div className="flex gap-3">
                                <button 
                                    onClick={prevSentence} disabled={currentIndex === 0}
                                    className="p-3 bg-white border border-gray-300 rounded-full text-gray-600 hover:bg-gray-100 disabled:opacity-30 disabled:hover:bg-white shadow-md transition-colors"
                                >
                                    <IconChevronLeft className="w-6 h-6 md:w-8 md:h-8" />
                                </button>
                                <button 
                                    onClick={nextSentence} disabled={currentIndex === activeSentences.length - 1}
                                    className="p-3 bg-white border border-gray-300 rounded-full text-gray-600 hover:bg-gray-100 disabled:opacity-30 disabled:hover:bg-white shadow-md transition-colors"
                                >
                                    <IconChevronRight className="w-6 h-6 md:w-8 md:h-8" />
                                </button>
                            </div>
                        </div>

                        {/* Sentences Display */}
                        <div className="p-8 md:p-14 flex flex-col items-center text-center space-y-10">
                            
                            <div className="space-y-4 w-full">
                                <p className="text-sm md:text-base font-bold text-blue-600 tracking-widest">JAPANESE</p>
                                {/* 日本語: サイズを調整して2行に収まりやすく */}
                                <h2 className="text-2xl md:text-4xl font-bold text-gray-900 leading-snug font-mincho">
                                    {currentSentence.jp}
                                </h2>
                            </div>

                            <div className="w-full h-px bg-gray-200 my-2"></div>

                            <div className="space-y-8 w-full flex flex-col items-center">
                                
                                {/* Display Mode Toggles */}
                                <div className="flex bg-gray-100 p-2 rounded-full w-full max-w-lg justify-between shadow-inner">
                                    <button 
                                        onClick={() => setDisplayMode('none')}
                                        className={`toggle-btn ${displayMode === 'none' ? 'toggle-btn-active-white' : 'toggle-btn-inactive'}`}
                                    >
                                        <IconEyeOff className="w-5 h-5" /> Hide
                                    </button>
                                    <button 
                                        onClick={() => setDisplayMode('blank')}
                                        className={`toggle-btn ${displayMode === 'blank' ? 'toggle-btn-active-blue' : 'toggle-btn-inactive'}`}
                                    >
                                        <IconFileText className="w-5 h-5" /> Fill-in
                                    </button>
                                    <button 
                                        onClick={() => setDisplayMode('full')}
                                        className={`toggle-btn ${displayMode === 'full' ? 'toggle-btn-active-green' : 'toggle-btn-inactive'}`}
                                    >
                                        <IconEye className="w-5 h-5" /> Full Text
                                    </button>
                                </div>
                                
                                <button 
                                    onClick={speakEnglish}
                                    className="flex items-center gap-3 px-8 py-4 rounded-full bg-blue-50 border-2 border-blue-200 text-blue-800 hover:bg-blue-100 shadow-sm transition-all font-bold text-lg md:text-xl hover:scale-105"
                                >
                                    <IconVolume2 className="w-6 h-6 md:w-8 md:h-8" />
                                    <span>Play Audio</span>
                                </button>

                                {/* 英文表示エリア: サイズを調整、カッコの改行防止 */}
                                <div className="min-h-[6rem] md:min-h-[8rem] flex items-center justify-center w-full mt-2">
                                    {displayMode === 'none' && (
                                        <p className="text-gray-300 text-xl md:text-2xl font-bold tracking-wide">(Text is hidden)</p>
                                    )}
                                    {displayMode === 'blank' && (
                                        <p className="text-2xl md:text-4xl font-bold text-blue-900 animate-fade-in tracking-wider leading-relaxed font-times prevent-orphan">
                                            {formatBlankText(currentSentence.enBlank)}
                                        </p>
                                    )}
                                    {displayMode === 'full' && (
                                        <p className="text-2xl md:text-4xl font-bold text-green-800 animate-fade-in tracking-wider leading-relaxed font-times">
                                            {currentSentence.en}
                                        </p>
                                    )}
                                </div>
                            </div>
                        </div>

                        {/* Record & Evaluate Area */}
                        <div className="bg-slate-50 p-8 md:p-14 border-t border-gray-200 flex justify-center">
                            <div className="bg-white p-8 md:p-12 rounded-3xl shadow-lg border border-gray-200 flex flex-col items-center space-y-8 w-full max-w-3xl">
                                
                                <div className="text-center mb-2">
                                    <h3 className="font-bold text-gray-800 text-2xl md:text-3xl flex items-center justify-center gap-3 mb-3">
                                        <IconMic className="text-blue-600 w-8 h-8 md:w-10 md:h-10" />
                                        Pronunciation Check
                                    </h3>
                                    <p className="text-gray-500 text-sm md:text-base">Tap to start speaking. Tap again to stop.</p>
                                </div>
                                
                                <button
                                    onClick={toggleRecording}
                                    className={`w-28 h-28 md:w-36 md:h-36 rounded-full flex items-center justify-center text-white shadow-2xl transition-all ${
                                        isActive ? 'bg-red-500 animate-pulse scale-105' : 'bg-red-600 hover:bg-red-700 hover:scale-110'
                                    }`}
                                >
                                    {isActive ? <IconSquare className="w-12 h-12" /> : <IconMic className="w-16 h-16" />}
                                </button>
                                
                                <p className="text-lg md:text-xl font-bold text-red-500 h-8">
                                    {isActive ? 'Recording & Listening...' : ''}
                                    {isProcessing && !isActive ? 'Calculating Score...' : ''}
                                </p>

                                {/* Results Area */}
                                {(audioUrl || recognitionText) && (
                                    <div className="w-full mt-6 flex flex-col items-center space-y-8 animate-fade-in border-t border-gray-200 pt-8">
                                        
                                        {/* AIスコアとテキスト */}
                                        {recognitionText && (
                                            <div className="w-full text-center space-y-6">
                                                <div className="bg-blue-50 p-6 md:p-8 rounded-2xl text-xl md:text-3xl text-gray-800 border border-blue-200 font-times tracking-wide shadow-inner">
                                                    "{recognitionText}"
                                                </div>
                                                
                                                {similarityScore !== null && (
                                                    <div className={`text-3xl md:text-5xl font-bold flex flex-col items-center justify-center gap-4 ${
                                                        similarityScore === 100 ? 'text-green-600' : 
                                                        similarityScore >= 80 ? 'text-blue-600' : 
                                                        similarityScore >= 60 ? 'text-orange-500' : 'text-red-500'
                                                    }`}>
                                                        <div className="flex items-center gap-3">
                                                            {similarityScore >= 80 && <IconCheckCircle className="w-12 h-12 md:w-16 md:h-16" />}
                                                            <span>Score: {similarityScore} / 100</span>
                                                        </div>
                                                        <span className="text-xl md:text-3xl font-bold mt-2 tracking-wider">
                                                            {similarityScore === 100 && "Perfect!! 🎉"}
                                                            {similarityScore >= 80 && similarityScore < 100 && "Excellent! 👍"}
                                                            {similarityScore >= 60 && similarityScore < 80 && "Good job! 🙂"}
                                                            {similarityScore < 60 && "Keep trying! 💪"}
                                                        </span>
                                                    </div>
                                                )}
                                            </div>
                                        )}

                                        {/* Audio Playback */}
                                        {audioUrl && (
                                            <div className="w-full flex flex-col items-center gap-3 bg-gray-100 p-5 rounded-2xl border border-gray-200 mt-4">
                                                <span className="text-base md:text-lg font-bold text-gray-600 flex items-center gap-2">
                                                    <IconVolume2 className="w-5 h-5" /> Listen to your voice
                                                </span>
                                                <audio src={audioUrl} controls className="w-full max-w-md h-12 shadow-sm rounded-full" />
                                            </div>
                                        )}

                                    </div>
                                )}
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('app'));
    </script>
</body>
</html>
